[tox]
min_version = 4.0
env_list =
    py310
    py311
    py312
    py313

[testenv]
description = Run the pytest suite
package = wheel
wheel_build_env = .pkg

allowlist_externals =
    uv

install_command =
    uv pip install --python {envpython} {opts} {packages}

deps =
    pytest>=8.0

commands =
    pytest {posargs}

set_env =
    UV_LINK_MODE = copy
    UV_CACHE_DIR = {envtmpdir}/uv-cache

pass_env =
    PGHOST
    PGPORT
    PGUSER
    PGPASSWORD
    PGDATABASE
    DATABASE_URL
