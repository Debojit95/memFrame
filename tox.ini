[tox]
min_version = 4.0
env_list =
    py310
    py311
    py312
    py313

[testenv]
description = Run the pytest suite
package = wheel
wheel_build_env = .pkg

allowlist_externals =
    uv

install_command =
    uv pip install --python {envpython} {opts} {packages}

deps =
    pytest>=8.0
    matplotlib>=3.10.9

commands =
    pytest {posargs}

set_env =
    UV_LINK_MODE = copy
    UV_CACHE_DIR = {envtmpdir}/uv-cache
    MPLCONFIGDIR = {envtmpdir}/matplotlib-cache

pass_env =
    MEMFRAME_TEST_BACKENDS
    UPLOAD_CSV_FILEPATH
    UPLOAD_PARQUET_FILEPATH
    DUCKDB_DB_PARAMS
    DUCKDB_UPLOAD_DB_BACKEND
    DUCKDB_UPLOAD_DB_PARAMS
    PGHOST
    PGPORT
    PGUSER
    PGPASSWORD
    PGDATABASE
    DATABASE_URL
    POSTGRES_DB_PARAMS
    POSTGRES_UPLOAD_DB_BACKEND
    POSTGRES_UPLOAD_DB_PARAMS
    CLICKHOUSE_HOST
    CLICKHOUSE_PORT
    CLICKHOUSE_USER
    CLICKHOUSE_PASSWORD
    CLICKHOUSE_DATABASE
    CLICKHOUSE_SECURE
    CLICKHOUSE_TIMEOUT
    CLICKHOUSE_DB_PARAMS
    CLICKHOUSE_UPLOAD_DB_BACKEND
    CLICKHOUSE_UPLOAD_DB_PARAMS
