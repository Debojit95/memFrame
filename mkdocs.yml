site_name: memFrame
site_description: Data analytics with database-backed DataFrame operations
site_url: https://debojit95.github.io/memFrame/

theme:
  name: material
  logo: assets/logo-nav.png
  favicon: assets/logo-nav.png
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            docstring_style: google
            show_source: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API:
      - DB Manager:
          - Connector: api/connector.md
          - Upload Manager: api/upload-manager.md
          - Dataset Operations: api/database.md
      - memFrame:
          - Inspect: api/inspect.md
          - Cleaning: api/cleaning.md
          - Selection: api/selection.md
          - Stats: api/stats.md
      - Plots:
          - Bar: api/bar.md
          - Bar Polar: api/bar_polar.md
          - Pie: api/pie.md
          - Line: api/line.md
          - Scatter: api/scatter.md
          - Scatter 3D: api/scatter3d.md
