name: Commit Checks

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:
    inputs:
      commit_mode:
        description: "Commit check mode"
        required: true
        default: "verify"
        type: choice
        options:
          - verify
          - no-verify

permissions:
  contents: read

env:
  UV_LINK_MODE: copy
  UPLOAD_CSV_FILEPATH: tests/datasets/sample.csv
  UPLOAD_PARQUET_FILEPATH: tests/datasets/sample.parquet
  DUCKDB_UPLOAD_DB_BACKEND: duckdb
  DUCKDB_UPLOAD_DB_PARAMS: '{"db_path":"memFrame_new.duckdb"}'
  DUCKDB_DB_PARAMS: '{"db_path":"memFrame_new.duckdb"}'
  POSTGRES_UPLOAD_DB_BACKEND: postgres
  POSTGRES_UPLOAD_DB_PARAMS: '{"backend":"postgres","host":"localhost","port":5723,"user":"postgres","password":"xx","database":"xx"}'
  POSTGRES_DB_PARAMS: '{"backend":"postgres","host":"localhost","port":5723,"user":"postgres","password":"xx","database":"xx"}'
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: xx
  POSTGRES_DB: xx
  CLICKHOUSE_UPLOAD_DB_BACKEND: clickhouse
  CLICKHOUSE_UPLOAD_DB_PARAMS: '{"backend":"clickhouse","host":"localhost","port":8123,"user":"default","password":"xx"}'
  CLICKHOUSE_USER: default
  CLICKHOUSE_PASSWORD: xx

jobs:
  no-verify:
    name: Skip commit checks
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.commit_mode == 'no-verify' }}
    steps:
      - name: Skip checks
        run: echo "Skipping commit checks because commit_mode=no-verify was selected."

  checks:
    name: Upload tests and tox
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.commit_mode != 'no-verify' }}
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
        ports:
          - 5723:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d xx"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:24.8
        env:
          CLICKHOUSE_USER: ${{ env.CLICKHOUSE_USER }}
          CLICKHOUSE_PASSWORD: ${{ env.CLICKHOUSE_PASSWORD }}
        ports:
          - 8123:8123
        options: >-
          --health-cmd "clickhouse-client --user default --password xx --query 'SELECT 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install check dependencies
        run: |
          python -m pip install --upgrade pip uv tox pytest
          python -m pip install -e .

      - name: Write check environment
        run: |
          {
            echo "UPLOAD_CSV_FILEPATH=$UPLOAD_CSV_FILEPATH"
            echo "UPLOAD_PARQUET_FILEPATH=$UPLOAD_PARQUET_FILEPATH"
            echo "DUCKDB_UPLOAD_DB_BACKEND=$DUCKDB_UPLOAD_DB_BACKEND"
            echo "DUCKDB_UPLOAD_DB_PARAMS='$DUCKDB_UPLOAD_DB_PARAMS'"
            echo "DUCKDB_DB_PARAMS='$DUCKDB_DB_PARAMS'"
            echo "POSTGRES_UPLOAD_DB_BACKEND=$POSTGRES_UPLOAD_DB_BACKEND"
            echo "POSTGRES_UPLOAD_DB_PARAMS='$POSTGRES_UPLOAD_DB_PARAMS'"
            echo "POSTGRES_DB_PARAMS='$POSTGRES_DB_PARAMS'"
            echo "CLICKHOUSE_UPLOAD_DB_BACKEND=$CLICKHOUSE_UPLOAD_DB_BACKEND"
            echo "CLICKHOUSE_UPLOAD_DB_PARAMS='$CLICKHOUSE_UPLOAD_DB_PARAMS'"
          } > .env

      - name: Run commit checks
        run: bash scripts/run-commit-checks.sh
